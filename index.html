    /* ---- Map Page ---- */
    function MapPage({ restaurants, personalData, onSelectRestaurant }) {
      const mapRef = useRef(null);
      const mapInstance = useRef(null);
      const markersRef = useRef([]);
      const [mapStatusFilter, setMapStatusFilter] = useState('todos');

      useEffect(() => {
        if (!mapInstance.current && mapRef.current) {
          mapInstance.current = L.map(mapRef.current).setView([3.4516, -76.5320], 13);
          L.tileLayer('https://{s}.tile.openstreetmap.org/{z}/{x}/{y}.png', {
            attribution: '&copy; OpenStreetMap'
          }).addTo(mapInstance.current);
        }
        return () => {};
      }, []);

      useEffect(() => {
        if (!mapInstance.current) return;

        markersRef.current.forEach(m => m.remove());
        markersRef.current = [];

        const filteredRestaurants = restaurants.filter(r => {
          if (!r.lat || !r.lng) return false;
          if (mapStatusFilter === 'todos') return true;
          const status = (personalData[r.id] || {}).status || 'sin-decidir';
          return status === mapStatusFilter;
        });

        filteredRestaurants.forEach(r => {
          const status = (personalData[r.id] || {}).status || 'sin-decidir';
          const color = status === 'quiero-ir' ? '#006765' : status === 'ya-fui' ? '#9b3f25' : '#89726c';

          const icon = L.divIcon({
            className: '',
            html: '<div style="background:' + color + ';width:28px;height:28px;border-radius:50%;border:3px solid white;box-shadow:0 2px 8px rgba(0,0,0,0.2);display:flex;align-items:center;justify-content:center"><span style="color:white;font-size:12px;font-weight:600">' + (r.priceTier ? r.priceTier.length : '') + '</span></div>',
            iconSize: [28, 28],
            iconAnchor: [14, 14],
            popupAnchor: [0, -16]
          });

          const marker = L.marker([r.lat, r.lng], { icon: icon }).addTo(mapInstance.current);

          const popupContent = '<div style="font-family:\'Be Vietnam Pro\',sans-serif;min-width:180px">' +
            '<div style="font-family:\'Newsreader\',serif;font-size:16px;font-weight:600;color:#231917;margin-bottom:4px">' + r.name + '</div>' +
            '<div style="font-size:12px;color:#56423d;margin-bottom:6px">' + r.zone + ' &middot; ' + (r.priceTier || '') + '</div>' +
            (r.rating ? '<div style="font-size:12px;color:#9b3f25;margin-bottom:6px">&#9733; ' + r.rating + ' (' + r.reviews + ')</div>' : '') +
            '<div style="font-size:11px;color:#89726c;margin-bottom:8px">' + r.cuisine + '</div>' +
            '<button onclick="window.__openDetail__(\'' + r.id + '\')" style="background:#9b3f25;color:white;border:none;padding:6px 12px;border-radius:8px;font-size:11px;cursor:pointer;width:100%">Ver detalle</button>' +
            '</div>';

          marker.bindPopup(popupContent);
          markersRef.current.push(marker);
        });
      }, [restaurants, personalData, mapStatusFilter]);

      return (
        <div style={{display:'flex', flexDirection:'column', height:'calc(100vh - 72px)'}}>
          <div style={{padding:'12px 16px', display:'flex', gap:8, overflowX:'auto', background:'var(--surface)', borderBottom:'1px solid var(--outline-variant)'}}>
            {['todos','quiero-ir','ya-fui','sin-decidir','no-interesa'].map(s => (
              <button key={s} onClick={() => setMapStatusFilter(s)} style={{
                padding:'6px 14px', borderRadius:9999, border:'1px solid', fontSize:11, fontWeight:600, cursor:'pointer', whiteSpace:'nowrap',
                fontFamily:'var(--font-body)', textTransform:'uppercase', letterSpacing:'0.08em',
                background: mapStatusFilter === s ? 'var(--primary)' : 'transparent',
                color: mapStatusFilter === s ? 'white' : 'var(--on-surface-variant)',
                borderColor: mapStatusFilter === s ? 'var(--primary)' : 'var(--outline-variant)'
              }}>
                {s === 'todos' ? 'Todos' : s === 'quiero-ir' ? 'Quiero ir' : s === 'ya-fui' ? 'Ya fui' : s === 'sin-decidir' ? 'Sin decidir' : 'No me interesa'}
              </button>
            ))}
          </div>
          <div ref={mapRef} style={{flex:1}} />
        </div>
      );
    }

    /* ---- Main App ---- */
    function App() {
      const [darkMode, setDarkMode] = useState(() => localStorage.getItem('theme') === 'dark');

      useEffect(() => {
        document.documentElement.setAttribute('data-theme', darkMode ? 'dark' : 'light');
        localStorage.setItem('theme', darkMode ? 'dark' : 'light');
      }, [darkMode]);

      const [user, setUser] = useState(null);
      const [authLoading, setAuthLoading] = useState(true);
      const [data, setData] = useState({ restaurants: [], personal: {}, photos: {} });
      const [loading, setLoading] = useState(true);
      const [page, setPage] = useState('home');
      const [view, setView] = useState('grid');
      const [search, setSearch] = useState('');
      const [zoneFilter, setZoneFilter] = useState('Todas');
      const [tagFilter, setTagFilter] = useState('');
      const [priceFilter, setPriceFilter] = useState('');
      const [statusFilter, setStatusFilter] = useState('todos');
      const [sortBy, setSortBy] = useState('rating');
      const [sortDesc, setSortDesc] = useState(true);
      const [selectedRestaurant, setSelectedRestaurant] = useState(null);
      const [showAddModal, setShowAddModal] = useState(false);
      const [showRandomizer, setShowRandomizer] = useState(false);

      useEffect(() => {
        const unsubscribe = auth.onAuthStateChanged((firebaseUser) => {
          if (firebaseUser && ALLOWED_EMAILS.includes(firebaseUser.email)) {
            setUser(firebaseUser);
          } else if (firebaseUser) {
            auth.signOut();
            setUser(null);
            alert('Acceso restringido. Solo usuarios autorizados pueden usar esta app.');
          } else {
            setUser(null);
          }
          setAuthLoading(false);
        });
        auth.getRedirectResult().catch(() => {});
        return () => unsubscribe();
      }, []);

      useEffect(() => {
        if (!user) return;
        dbRef.on('value', (snapshot) => {
          const val = snapshot.val();
          if (!val || !val.restaurants) {
            seedDatabase();
            return;
          }
          const restaurants = Object.values(val.restaurants);
          const personal = val.personal || {};
          const photos = val.photos || {};
          setData({ restaurants, personal, photos });
          setLoading(false);
        });
        return () => dbRef.off();
      }, [user]);

      const handleSignIn = () => {
        const provider = new firebase.auth.GoogleAuthProvider();
        auth.signInWithPopup(provider).catch((err) => {
          if (err.code === 'auth/popup-blocked') auth.signInWithRedirect(provider);
        });
      };

      const handleSignOut = () => { auth.signOut(); };

      const handlePhotoUpload = async (restaurantId, file) => {
        if (!user) return;
        try {
          const compressed = await compressImage(file, 800, 0.65);
          const timestamp = Date.now();
          const fileName = timestamp + '_' + user.uid.slice(0,6) + '.jpg';
          const storageRef = storage.ref('photos/' + restaurantId + '/' + fileName);
          const snapshot = await storageRef.put(compressed, { contentType: 'image/jpeg' });
          const url = await snapshot.ref.getDownloadURL();
          const photoRef = dbRef.child('photos/' + restaurantId).push();
          await photoRef.set({
            url: url,
            storagePath: 'photos/' + restaurantId + '/' + fileName,
            uploadedBy: user.displayName || user.email,
            uploadedByUid: user.uid,
            uploadedAt: timestamp,
            caption: ''
          });
        } catch (err) {
          alert('Error al subir foto: ' + err.message);
        }
      };

      const handlePhotoDelete = async (restaurantId, photoId, storagePath) => {
        if (!user) return;
        try {
          await storage.ref(storagePath).delete();
          await dbRef.child('photos/' + restaurantId + '/' + photoId).remove();
        } catch (err) {
          alert('Error al eliminar foto: ' + err.message);
        }
      };

      useEffect(() => {
        window.__openDetail__ = (id) => {
          const r = data.restaurants.find(r => r.id === id);
          if (r) setSelectedRestaurant(r);
        };
      }, [data.restaurants]);

      const zones = useMemo(() => {
        const z = [...new Set(data.restaurants.map(r => r.zone))];
        return ['Todas', ...z.sort()];
      }, [data.restaurants]);

      const allTags = useMemo(() => {
        const t = new Set();
        data.restaurants.forEach(r => (r.tags || []).forEach(tag => t.add(tag)));
        return [...t].sort();
      }, [data.restaurants]);

      const filtered = useMemo(() => {
        return data.restaurants
          .filter(r => {
            if (zoneFilter !== 'Todas' && r.zone !== zoneFilter) return false;
            if (tagFilter && !(r.tags || []).includes(tagFilter)) return false;
            if (priceFilter && r.priceTier !== priceFilter) return false;
            if (statusFilter === 'abierto-hoy') {
              if (isOpenToday(r.closedDay) === false) return false;
            } else if (statusFilter !== 'todos') {
              const ps = (data.personal[r.id] || {}).status || 'sin-decidir';
              if (ps !== statusFilter) return false;
            }
            if (search) {
              const q = search.toLowerCase();
              return r.name.toLowerCase().includes(q) || r.cuisine.toLowerCase().includes(q) || r.zone.toLowerCase().includes(q) || (r.highlight && r.highlight.toLowerCase().includes(q)) || (r.tags || []).some(t => t.includes(q));
            }
            return true;
          })
          .sort((a, b) => {
            let va = a[sortBy];
            let vb = b[sortBy];
            if (va === null || va === undefined) va = sortDesc ? -Infinity : Infinity;
            if (vb === null || vb === undefined) vb = sortDesc ? -Infinity : Infinity;
            if (typeof va === 'string') return sortDesc ? vb.localeCompare(va) : va.localeCompare(vb);
            return sortDesc ? vb - va : va - vb;
          });
      }, [data, zoneFilter, tagFilter, priceFilter, statusFilter, search, sortBy, sortDesc]);

      const stats = useMemo(() => {
        const total = data.restaurants.length;
        let quiero = 0, fui = 0, no = 0, totalSpent = 0, totalVisits = 0;
        Object.values(data.personal).forEach(p => {
          if (p.status === 'quiero-ir') quiero++;
          if (p.status === 'ya-fui') fui++;
          if (p.status === 'no-interesa') no++;
          if (p.visits) {
            const vList = typeof p.visits === 'object' ? Object.values(p.visits) : [];
            totalVisits += vList.length;
            vList.forEach(v => { if (v.spent) totalSpent += Number(v.spent) || 0; });
          } else if (p.totalSpent) {
            totalVisits += 1;
            totalSpent += Number(p.totalSpent) || 0;
          }
        });
        const avgPerVisit = totalVisits > 0 ? Math.round(totalSpent / totalVisits) : 0;
        return { total, quiero, fui, no, totalSpent, totalVisits, avgPerVisit };
      }, [data]);

      const handleSort = (key) => {
        if (sortBy === key) setSortDesc(!sortDesc);
        else { setSortBy(key); setSortDesc(key === 'name' || key === 'cuisine' ? false : true); }
      };

      const handleRate = (id, val) => {
        const current = data.personal[id] || {};
        dbRef.child('personal/' + id).update({ ...current, myRating: val });
      };

      const handleStatusChange = (id, newStatus) => {
        const current = data.personal[id] || { myRating: 0, dateVisited: '', whatIOrdered: '', totalSpent: '', notes: '', wouldReturn: null };
        dbRef.child('personal/' + id).update({ ...current, status: newStatus });
      };

      const handleSavePersonal = (id, personal) => {
        dbRef.child('personal/' + id).set(personal);
        setSelectedRestaurant(null);
      };

      const handleDelete = (id) => {
        dbRef.child('restaurants/' + id).remove();
        dbRef.child('personal/' + id).remove();
        setSelectedRestaurant(null);
      };

      const handleAdd = (restaurant, status) => {
        dbRef.child('restaurants/' + restaurant.id).set(restaurant);
        dbRef.child('personal/' + restaurant.id).set({ status, myRating: 0, dateVisited: '', whatIOrdered: '', totalSpent: '', notes: '', wouldReturn: null });
        setShowAddModal(false);
      };

      if (authLoading) return (
        <div className="app" style={{display:'flex', flexDirection:'column', alignItems:'center', justifyContent:'center', minHeight:'60vh'}}>
          <h1 style={{fontFamily:'var(--font-headline)', fontSize:32, color:'var(--primary)', fontWeight:600}}>La Esquinita</h1>
          <p style={{color:'var(--on-surface-variant)', fontSize:14, marginTop:8}}>Cargando...</p>
        </div>
      );

      if (!user) return (
        <div className="login-screen">
          <h1 style={{fontFamily:'var(--font-headline)', fontSize:42, color:'var(--primary)', fontWeight:600}}>La Esquinita</h1>
          <p style={{color:'var(--on-surface-variant)', fontSize:16}}>Nuestro espacio gastron&oacute;mico &middot; Isabela &amp; Mateo</p>
          <button onClick={handleSignIn} className="btn-primary" style={{display:'flex', alignItems:'center', gap:10, padding:'14px 32px', fontSize:16}}>
            <span className="material-symbols-outlined">login</span>
            Iniciar sesi&oacute;n con Google
          </button>
        </div>
      );

      if (loading) return (
        <div className="app" style={{display:'flex', flexDirection:'column', alignItems:'center', justifyContent:'center', minHeight:'60vh'}}>
          <h1 style={{fontFamily:'var(--font-headline)', fontSize:32, color:'var(--primary)', fontWeight:600}}>La Esquinita</h1>
          <p style={{color:'var(--on-surface-variant)', fontSize:14, marginTop:8}}>Cargando restaurantes...</p>
        </div>
      );

      return (
        <div>
          <div style={{position:'fixed', top:12, right:16, zIndex:1001, display:'flex', alignItems:'center', gap:8}}>
            <button onClick={() => setDarkMode(!darkMode)} style={{width:32, height:32, borderRadius:'50%', border:'1px solid var(--outline-variant)', background:'var(--card-bg)', color:'var(--on-surface-variant)', cursor:'pointer', display:'flex', alignItems:'center', justifyContent:'center'}} title={darkMode ? 'Modo claro' : 'Modo oscuro'}>
              <span className="material-symbols-outlined" style={{fontSize:18}}>{darkMode ? 'light_mode' : 'dark_mode'}</span>
            </button>
            <div className="user-pill" onClick={handleSignOut} title="Cerrar sesi&oacute;n" style={{position:'static'}}>
              <img src={user.photoURL} alt="" referrerPolicy="no-referrer" />
              <span>{user.displayName ? user.displayName.split(' ')[0] : user.email}</span>
            </div>
          </div>
          {page === 'home' && (
            <HomePage
              stats={stats}
              restaurants={data.restaurants}
              personalData={data.personal}
              onNavigate={(p) => p === 'randomizer' ? setShowRandomizer(true) : setPage(p)}
            />
          )}

          {page === 'list' && (
            <ListPage
              stats={stats}
              filtered={filtered}
              allTags={allTags}
              zones={zones}
              search={search}
              setSearch={setSearch}
              tagFilter={tagFilter}
              setTagFilter={setTagFilter}
              zoneFilter={zoneFilter}
              setZoneFilter={setZoneFilter}
              priceFilter={priceFilter}
              setPriceFilter={setPriceFilter}
              statusFilter={statusFilter}
              setStatusFilter={setStatusFilter}
              view={view}
              setView={setView}
              sortBy={sortBy}
              sortDesc={sortDesc}
              setSortBy={setSortBy}
              setSortDesc={setSortDesc}
              handleSort={handleSort}
              personalData={data.personal}
              setSelectedRestaurant={setSelectedRestaurant}
              handleRate={handleRate}
              handleStatusChange={handleStatusChange}
              setShowAddModal={setShowAddModal}
            />
          )}

          {page === 'photos' && (
            <FeedPage
              restaurants={data.restaurants}
              photos={data.photos}
              personalData={data.personal}
              onSelectRestaurant={setSelectedRestaurant}
            />
          )}

          {page === 'map' && (
            <MapPage
              restaurants={data.restaurants}
              personalData={data.personal}
              onSelectRestaurant={setSelectedRestaurant}
            />
          )}

          {selectedRestaurant && (
            <DetailPanel
              restaurant={selectedRestaurant}
              personal={data.personal[selectedRestaurant.id]}
              photos={data.photos[selectedRestaurant.id]}
              onClose={() => setSelectedRestaurant(null)}
              onSave={handleSavePersonal}
              onDelete={handleDelete}
              onPhotoUpload={handlePhotoUpload}
              onPhotoDelete={handlePhotoDelete}
            />
          )}

          {showAddModal && (
            <AddModal onClose={() => setShowAddModal(false)} onAdd={handleAdd} />
          )}

          {showRandomizer && (
            <RandomizerModal
              restaurants={data.restaurants}
              personalData={data.personal}
              onClose={() => setShowRandomizer(false)}
              onSelect={(r) => { setShowRandomizer(false); setSelectedRestaurant(r); }}
            />
          )}

          <BottomNav page={page} onNavigate={setPage} />
        </div>
      );
    }

    ReactDOM.createRoot(document.getElementById('root')).render(<App />);
  </script>
</body>
</html>
