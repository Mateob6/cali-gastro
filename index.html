    .modal-actions {

    }
  </style>

    const dbRef = db.ref('cali-gastro');

    function seedDatabase() {
      const restaurantsObj = {};
      DEFAULT_RESTAURANTS.forEach(r => { restaurantsObj[r.id] = r; });
      dbRef.set({ restaurants: restaurantsObj, personal: {} });
    }

    function StarRating({ rating, onRate, size = 16 }) {
      const [hover, setHover] = useState(0);
      return (
        <div className="stars" onMouseLeave={() => setHover(0)}>
          {[1,2,3,4,5].map(i => (
            <span
              key={i}
              className={`star ${i <= (hover || rating) ? 'filled' : ''}`}
              style={{ fontSize: size }}
              onMouseEnter={() => onRate && setHover(i)}
              onClick={(e) => { e.stopPropagation(); onRate && onRate(i === rating ? 0 : i); }}
            >★</span>
          ))}
        </div>
      );
    }

    function StatusBadge({ status }) {
      const labels = { 'quiero-ir': 'Quiero ir', 'ya-fui': 'Ya fui', 'no-interesa': 'No me interesa', 'sin-decidir': 'Sin decidir' };
      return <span className={`card-status ${status}`}>{labels[status] || labels['sin-decidir']}</span>;
    }

    function RestaurantCard({ restaurant, personal, onClick, onRate }) {
      const p = personal || {};
      return (
        <div className="card" onClick={onClick}>
          <div className="card-name">{restaurant.name}</div>
          <div style={{display:'flex', gap:6, alignItems:'center', flexWrap:'wrap', marginBottom:4}}>
            <span className="card-zone">{restaurant.zone}</span>
            {restaurant.priceTier && <span className="card-zone" style={{background:'var(--status-fui-bg)', color:'var(--accent-gold)'}}>{restaurant.priceTier}</span>}
          </div>
          <div className="card-tags">
            {(restaurant.tags || []).slice(0, 3).map(t => <span key={t} className="tag-pill">{t}</span>)}
          </div>
          <div className="card-meta">
            <span className="card-price">{restaurant.priceRange}</span>
            {restaurant.rating && (
              <span className="card-rating">
                <span className="star">★</span> {restaurant.rating}
              </span>
            )}
            {restaurant.reviews > 0 && <span className="card-reviews">{restaurant.reviews.toLocaleString()} reseñas</span>}
          </div>
          <div className="card-personal">
            <StatusBadge status={p.status || 'sin-decidir'} />
            <StarRating rating={p.myRating || 0} onRate={onRate} size={14} />

          <table className="rtable">
            <thead>
              <tr>
                <th onClick={() => onSort('name')}>Restaurante{arrow('name')}</th>
                <th onClick={() => onSort('cuisine')}>Cocina{arrow('cuisine')}</th>

                <th>Estado</th>

            </thead>
            <tbody>
              {restaurants.map(r => {
                const p = personalData[r.id] || {};
                return (
                  <tr key={r.id} onClick={() => onSelect(r)}>
                    <td>

                    <td style={{fontStyle:'italic', color:'var(--text-muted)'}}>{r.cuisine}</td>

        rating: '', reviews: '', highlight: '', vibe: '', closedDay: 'Abierto siempre',
        reserva: true, instagram: '', status: 'sin-decidir'
      });

      const zones = ['Granada', 'El Peñón', 'San Antonio', 'San Fernando', 'Ciudad Jardín', 'Centenario', 'La Flora (Norte)', 'Granada (Norte)', 'Cristo Rey (mirador)', 'Oeste (Río Cali)', 'Pance', 'Otro'];
      const days = ['Abierto siempre', 'Lunes', 'Martes', 'Miércoles', 'Jueves', 'Viernes', 'Sábado', 'Domingo', 'Dom (solo almuerzo)', 'Lunes y Martes', 'Domingo y Lunes'];

      const handleSubmit = () => {
        if (!form.name.trim()) return alert('El nombre es requerido');
        const id = form.name.toLowerCase().replace(/[^a-z0-9]+/g, '-').replace(/-+$/, '');
        onAdd({
          id,
          name: form.name.trim(),
          zone: form.zone,
          cuisine: form.cuisine,
          priceRange: form.priceMin && form.priceMax ? `$${form.priceMin}K–${form.priceMax}K` : '',
          priceMin: Number(form.priceMin) || 0,
          priceMax: Number(form.priceMax) || 0,
          rating: Number(form.rating) || null,
          reviews: Number(form.reviews) || 0,
          highlight: form.highlight,
          vibe: form.vibe,
          reserva: form.reserva,
          closedDay: form.closedDay,
          instagram: form.instagram || null,
        }, form.status);

    function App() {
      const [data, setData] = useState({ restaurants: [], personal: {} });
      const [loading, setLoading] = useState(true);
      const [view, setView] = useState('grid');
      const [search, setSearch] = useState('');
      const [zoneFilter, setZoneFilter] = useState('Todas');
      const [tagFilter, setTagFilter] = useState('');
      const [priceFilter, setPriceFilter] = useState('');
      const [statusFilter, setStatusFilter] = useState('todos');
      const [sortBy, setSortBy] = useState('rating');
      const [sortDesc, setSortDesc] = useState(true);
      const [selectedRestaurant, setSelectedRestaurant] = useState(null);
      const [showAddModal, setShowAddModal] = useState(false);

      useEffect(() => {
        dbRef.on('value', (snapshot) => {
          const val = snapshot.val();
          if (!val || !val.restaurants) {
            seedDatabase();
            return;
          }
          const restaurants = Object.values(val.restaurants);
          const personal = val.personal || {};
          setData({ restaurants, personal });
          setLoading(false);
        });
        return () => dbRef.off();
      }, []);

      const zones = useMemo(() => {
        const z = [...new Set(data.restaurants.map(r => r.zone))];
        return ['Todas', ...z.sort()];
      }, [data.restaurants]);

      const allTags = useMemo(() => {
        const t = new Set();
        data.restaurants.forEach(r => (r.tags || []).forEach(tag => t.add(tag)));
        return [...t].sort();
      }, [data.restaurants]);

      const filtered = useMemo(() => {
        return data.restaurants
          .filter(r => {
            if (zoneFilter !== 'Todas' && r.zone !== zoneFilter) return false;
            if (tagFilter && !(r.tags || []).includes(tagFilter)) return false;
            if (priceFilter && r.priceTier !== priceFilter) return false;
            if (statusFilter !== 'todos') {
              const ps = (data.personal[r.id] || {}).status || 'sin-decidir';
              if (ps !== statusFilter) return false;
            }
            if (search) {
              const q = search.toLowerCase();
              return r.name.toLowerCase().includes(q) || r.cuisine.toLowerCase().includes(q) || r.zone.toLowerCase().includes(q) || (r.highlight && r.highlight.toLowerCase().includes(q)) || (r.tags || []).some(t => t.includes(q));
            }
            return true;
          })
          .sort((a, b) => {
            let va = a[sortBy];
            let vb = b[sortBy];
            if (va === null || va === undefined) va = sortDesc ? -Infinity : Infinity;
            if (vb === null || vb === undefined) vb = sortDesc ? -Infinity : Infinity;
            if (typeof va === 'string') return sortDesc ? vb.localeCompare(va) : va.localeCompare(vb);
            return sortDesc ? vb - va : va - vb;
          });
      }, [data, zoneFilter, tagFilter, priceFilter, statusFilter, search, sortBy, sortDesc]);

      const stats = useMemo(() => {
        const total = data.restaurants.length;
        let quiero = 0, fui = 0, no = 0;
        Object.values(data.personal).forEach(p => {
          if (p.status === 'quiero-ir') quiero++;
          if (p.status === 'ya-fui') fui++;
          if (p.status === 'no-interesa') no++;
        });
        return { total, quiero, fui, no };
      }, [data]);

      const handleSort = (key) => {
        if (sortBy === key) setSortDesc(!sortDesc);
        else { setSortBy(key); setSortDesc(key === 'name' || key === 'cuisine' ? false : true); }
      };

      const handleRate = (id, val) => {
        const current = data.personal[id] || {};
        dbRef.child('personal/' + id).update({ ...current, myRating: val });
      };

      const handleSavePersonal = (id, personal) => {
        dbRef.child('personal/' + id).set(personal);
        setSelectedRestaurant(null);
      };

      const handleDelete = (id) => {
        dbRef.child('restaurants/' + id).remove();
        dbRef.child('personal/' + id).remove();
        setSelectedRestaurant(null);
      };

      const handleAdd = (restaurant, status) => {
        dbRef.child('restaurants/' + restaurant.id).set(restaurant);
        dbRef.child('personal/' + restaurant.id).set({ status, myRating: 0, dateVisited: '', whatIOrdered: '', totalSpent: '', notes: '', wouldReturn: null });
        setShowAddModal(false);
      };

      if (loading) return (
        <div className="app" style={{display:'flex', flexDirection:'column', alignItems:'center', justifyContent:'center', minHeight:'60vh'}}>
          <h1 style={{fontFamily:'var(--font-headline)', fontSize:28, marginBottom:8}}>Cali Gastro</h1>
          <p style={{color:'var(--text-muted)', fontSize:14}}>Cargando restaurantes...</p>
        </div>
      );

      return (
        <div className="app">
          <div className="header">
            <h1>Cali Gastro</h1>
            <p className="subtitle">Tu guía personal de restaurantes en Cali</p>
            <div className="stats">
              <span><span className="stat-num">{stats.total}</span> restaurantes</span>
              <span><span className="stat-num">{stats.quiero}</span> por visitar</span>
              <span><span className="stat-num">{stats.fui}</span> visitados</span>
            </div>
          </div>

          <div className="filters">
            <input
              className="search-input"
              placeholder="Buscar por nombre, cocina, zona..."
              value={search}
              onChange={e => setSearch(e.target.value)}
            />
            <select className="filter-select" value={zoneFilter} onChange={e => setZoneFilter(e.target.value)}>
              {zones.map(z => <option key={z} value={z}>{z}</option>)}
            </select>
            <select className="filter-select" value={tagFilter} onChange={e => setTagFilter(e.target.value)}>
              <option value="">Categoría</option>
              {allTags.map(t => <option key={t} value={t}>{t}</option>)}
            </select>
            <select className="filter-select" value={priceFilter} onChange={e => setPriceFilter(e.target.value)}>
              <option value="">Precio</option>
              <option value="$">$ (&lt;40K)</option>
              <option value="$$">$$ (40K–70K)</option>
              <option value="$$$">$$$ (70K–120K)</option>
              <option value="$$$$">$$$$ (&gt;120K)</option>
            </select>
            <div className="status-chips">
              {[{key:'todos',label:'Todos'},{key:'quiero-ir',label:'Quiero ir'},{key:'ya-fui',label:'Ya fui'},{key:'no-interesa',label:'No me interesa'},{key:'sin-decidir',label:'Sin decidir'}].map(s => (
                <button key={s.key} className={`status-chip ${statusFilter === s.key ? 'active' : ''}`} onClick={() => setStatusFilter(s.key)}>{s.label}</button>
              ))}
            </div>
            <div className="view-toggle">
              <button className={`view-btn ${view === 'grid' ? 'active' : ''}`} onClick={() => setView('grid')}>Grid</button>
              <button className={`view-btn ${view === 'table' ? 'active' : ''}`} onClick={() => setView('table')}>Tabla</button>
            </div>
          </div>

          <div className="toolbar">
            <span className="count">{filtered.length} restaurantes</span>
            <select className="sort-select" value={`${sortBy}-${sortDesc?'desc':'asc'}`} onChange={e => {
              const [key, dir] = e.target.value.split('-');
              setSortBy(key);
              setSortDesc(dir === 'desc');
            }}>
              <option value="rating-desc">Mayor rating</option>
              <option value="rating-asc">Menor rating</option>
              <option value="priceMin-asc">Menor precio</option>
              <option value="priceMin-desc">Mayor precio</option>
              <option value="reviews-desc">Más reseñas</option>
              <option value="name-asc">Nombre A-Z</option>
              <option value="name-desc">Nombre Z-A</option>
            </select>
          </div>

          {view === 'grid' ? (
            <div className="grid">
              {filtered.map(r => (
                <RestaurantCard
                  key={r.id}
                  restaurant={r}
                  personal={data.personal[r.id]}
                  onClick={() => setSelectedRestaurant(r)}
                  onRate={(val) => handleRate(r.id, val)}
                />
              ))}
            </div>
          ) : (
            <RestaurantTable
              restaurants={filtered}
              personalData={data.personal}
              onSelect={setSelectedRestaurant}
              onRate={handleRate}
              sortBy={sortBy}
              sortDesc={sortDesc}
              onSort={handleSort}
            />
          )}

          {filtered.length === 0 && (
            <div style={{textAlign:'center', padding:'60px 20px', color:'var(--text-muted)'}}>
              <div style={{fontSize:32, marginBottom:12}}>🍽️</div>
              <div style={{fontSize:14}}>No hay restaurantes que coincidan con los filtros</div>
            </div>
          )}

          <button className="fab" onClick={() => setShowAddModal(true)} title="Agregar restaurante">+</button>

          {selectedRestaurant && (
            <DetailPanel
              restaurant={selectedRestaurant}
              personal={data.personal[selectedRestaurant.id]}
              onClose={() => setSelectedRestaurant(null)}
              onSave={handleSavePersonal}
              onDelete={handleDelete}
            />
          )}

          {showAddModal && (
            <AddModal onClose={() => setShowAddModal(false)} onAdd={handleAdd} />
          )}
        </div>
      );
    }

    ReactDOM.createRoot(document.getElementById('root')).render(<App />);
  </script>
</body>
</html>
